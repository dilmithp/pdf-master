# Requires repo secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (or OIDC role via AWS_OIDC_ROLE_ARN)
#   AWS_ACCOUNT_ID, AWS_REGION
# And the following ECR repos must exist:
#   pdfmaster/{gateway,auth-service,billing-service,esign-service,notification-service,
#              pdf-core-service,pdf-convert-service,pdf-ocr-service,pdf-ai-service}

name: Build and Push

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-ci:
    name: Backend CI gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-enabled: true

      - name: Spotless check
        run: ./gradlew spotlessCheck --stacktrace

      - name: License audit
        run: ./gradlew checkLicense --stacktrace

      - name: Build and test
        run: ./gradlew build --stacktrace

  build-push:
    name: Build + Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: backend-ci
    continue-on-error: true
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth-service
          - billing-service
          - esign-service
          - notification-service
          - pdf-core-service
          - pdf-convert-service
          - pdf-ocr-service
          - pdf-ai-service

    steps:
      - name: Skip if ECR not configured
        if: ${{ secrets.AWS_ACCOUNT_ID == '' }}
        run: |
          echo "::warning::AWS_ACCOUNT_ID secret not set — skipping ECR push. Configure repository secrets to enable."
          exit 0

      - name: Checkout
        uses: actions/checkout@v4

      # OIDC (preferred): set AWS_OIDC_ROLE_ARN secret and remove static key secrets.
      # Static keys (fallback): set AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY secrets.
      - name: Configure AWS credentials (OIDC)
        if: ${{ secrets.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS credentials (static keys)
        if: ${{ secrets.AWS_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.ecr.outputs.registry }}/pdfmaster/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/pdfmaster/${{ matrix.service }}:${{ github.run_number }}
            ${{ steps.ecr.outputs.registry }}/pdfmaster/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
