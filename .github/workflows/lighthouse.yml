name: Lighthouse CI — Core Web Vitals Gate

on:
  pull_request:
    paths:
      - "apps/web/**"

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm --filter @pdf-master/web build
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          # Sentry is disabled in CI Lighthouse builds to avoid DSN requirement
          NEXT_PUBLIC_SENTRY_DSN: ""

      - name: Start production server
        run: pnpm --filter @pdf-master/web start &
        env:
          PORT: 3000
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SENTRY_DSN: ""

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: apps/web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Comment Lighthouse results on PR
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Find lhci report files
            const reportDir = '.lighthouseci';
            let comment = '## Lighthouse CI Results\n\n';

            if (fs.existsSync(reportDir)) {
              const files = fs.readdirSync(reportDir);
              const manifestFile = files.find(f => f === 'manifest.json');

              if (manifestFile) {
                const manifest = JSON.parse(
                  fs.readFileSync(path.join(reportDir, manifestFile), 'utf8')
                );

                comment += '| URL | Performance | LCP | INP | CLS | Status |\n';
                comment += '|-----|-------------|-----|-----|-----|--------|\n';

                for (const entry of manifest) {
                  const summary = entry.summary ?? {};
                  const lcp = summary['largest-contentful-paint'] ?? 'N/A';
                  const cls = summary['cumulative-layout-shift'] ?? 'N/A';
                  const perf = summary.performance ?? 'N/A';
                  const status = entry.isRepresentativeRun ? '✅' : '⚠️';
                  comment += `| ${entry.url} | ${Math.round((perf ?? 0) * 100)} | ${lcp} | - | ${cls} | ${status} |\n`;
                }
              } else {
                comment += '_No manifest found — check Lighthouse CI logs._\n';
              }
            } else {
              comment += '_Lighthouse CI did not produce a report directory._\n';
            }

            comment += '\n> LCP target: < 2.0s | INP target: < 200ms | CLS target: < 0.05\n';

            // Find existing bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lighthouse CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
