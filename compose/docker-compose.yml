version: "3.9"

networks:
  pdfmaster-dev:
    driver: bridge

volumes:
  postgres-data:
  postgres-vector-data:
  redis-data:
  rabbitmq-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdfmaster
      POSTGRES_PASSWORD: pdfmaster
      POSTGRES_DB: pdfmaster
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pdfmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pdfmaster-dev

  postgres-vector:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdfmaster
      POSTGRES_PASSWORD: pdfmaster
      POSTGRES_DB: pdfmaster
    ports:
      - "5433:5432"
    volumes:
      - postgres-vector-data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "pdfmaster"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pdfmaster-dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - pdfmaster-dev

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pdfmaster-dev

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - pdfmaster-dev

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/pdfmaster-uploads --ignore-existing &&
        mc ilm rule add --expire-days 1 --tags 'auto-delete=true' local/pdfmaster-uploads &&
        echo 'minio-init: bucket and lifecycle rule configured'
      "
    networks:
      - pdfmaster-dev

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pdfmaster-dev
