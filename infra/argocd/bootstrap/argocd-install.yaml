# Bootstrap Application — installs ArgoCD itself via Helm.
# Apply this manually once: kubectl apply -f infra/argocd/bootstrap/argocd-install.yaml
# After ArgoCD is healthy, it will self-manage and sync the ApplicationSet.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: pdfmaster-bootstrap
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://argoproj.github.io/argo-helm"
    chart: argo-cd
    targetRevision: "7.7.16"  # pin to a known-good version
    helm:
      values: |
        global:
          image:
            tag: "v2.13.3"
        configs:
          params:
            server.insecure: false
          cm:
            application.resourceTrackingMethod: annotation
            resource.customizations.health.argoproj.io_Application: |
              hs = {}
              hs.status = "Progressing"
              hs.message = ""
              if obj.status ~= nil then
                if obj.status.health ~= nil then
                  hs.status = obj.status.health.status
                  if obj.status.health.message ~= nil then
                    hs.message = obj.status.health.message
                  end
                end
              end
              return hs
        server:
          autoscaling:
            enabled: true
            minReplicas: 2
        redis-ha:
          enabled: true
        controller:
          replicas: 1
        repoServer:
          autoscaling:
            enabled: true
            minReplicas: 2
        applicationSet:
          replicas: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
