image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/auth-service
  tag: "latest"

replicaCount: 2

port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

keda:
  enabled: false

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-auth-service

secrets:
  - name: jwt
    remoteRef: pdfmaster/prod/auth/oauth2-jwt-key
  - name: clerk
    remoteRef: pdfmaster/prod/clerk/secret-key
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://RDS_HOST_PLACEHOLDER:5432/auth"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: false
    allowRDS: true
    allowRedis: false
    allowRabbitMQ: false
    allowGateway: false

service:
  type: ClusterIP

podDisruptionBudget:
  enabled: true
  minAvailable: 1
