image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/billing-service
  tag: "latest"

replicaCount: 2

port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

keda:
  enabled: false

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-billing-service

secrets:
  - name: stripe
    remoteRef: pdfmaster/prod/billing/stripe-secret-key
  - name: stripe-webhook
    remoteRef: pdfmaster/prod/billing/stripe-webhook-secret
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://RDS_HOST_PLACEHOLDER:5432/billing"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: false
    allowRDS: true
    allowRedis: false
    allowRabbitMQ: true
    allowGateway: false
    # Allow outbound HTTPS to Stripe API
    extraCidrs:
      - cidr: 0.0.0.0/0
        port: 443
        protocol: TCP

service:
  type: ClusterIP

podDisruptionBudget:
  enabled: true
  minAvailable: 1
