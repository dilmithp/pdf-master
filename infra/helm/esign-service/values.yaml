image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/esign-service
  tag: "latest"

replicaCount: 2

port: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

keda:
  enabled: false

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-esign-service

secrets:
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password
  - name: rabbitmq
    remoteRef: pdfmaster/prod/rabbitmq/connection

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://RDS_HOST_PLACEHOLDER:5432/esign"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  AWS_S3_BUCKET: "pdfmaster-prod-documents"
  AWS_REGION: "us-east-1"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: true
    allowRDS: true
    allowRedis: false
    allowRabbitMQ: true
    allowGateway: false

service:
  type: ClusterIP

podDisruptionBudget:
  enabled: true
  minAvailable: 1
