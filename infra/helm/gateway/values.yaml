image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/gateway
  tag: "latest"

replicaCount: 2

port: 8080

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

keda:
  enabled: false

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-gateway

secrets:
  - name: rabbitmq
    remoteRef: pdfmaster/prod/rabbitmq/connection
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password
  - name: redis
    remoteRef: pdfmaster/prod/redis/auth-token
  - name: clerk
    remoteRef: pdfmaster/prod/clerk/secret-key

config:
  SPRING_CLOUD_GATEWAY_HTTPCLIENT_CONNECT_TIMEOUT: "5000"
  SPRING_CLOUD_GATEWAY_HTTPCLIENT_RESPONSE_TIMEOUT: "60000"
  SPRING_REDIS_HOST: "REDIS_HOST_PLACEHOLDER"
  SPRING_REDIS_PORT: "6379"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: false
    allowRDS: true
    allowRedis: true
    allowRabbitMQ: false
    allowGateway: false

service:
  type: LoadBalancer

podAnnotations:
  service.beta.kubernetes.io/aws-load-balancer-type: "external"
  service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
  service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
