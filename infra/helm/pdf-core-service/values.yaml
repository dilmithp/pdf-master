image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/pdf-core-service
  tag: "latest"

# replicaCount is managed by KEDA; setting here is ignored when keda.enabled=true
replicaCount: 1

port: 8080

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "2Gi"

hpa:
  enabled: false  # KEDA replaces HPA

keda:
  enabled: true
  queueName: "pdf-core-jobs"
  minReplicas: 0
  maxReplicas: 20
  targetMessageCount: 5

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-pdf-core-service

secrets:
  - name: rabbitmq
    remoteRef: pdfmaster/prod/rabbitmq/connection
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://RDS_HOST_PLACEHOLDER:5432/pdfcore"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  AWS_S3_BUCKET: "pdfmaster-prod-documents"
  AWS_REGION: "us-east-1"
  # Sandboxed worker settings
  PDF_WORKER_SANDBOX_ENABLED: "true"
  PDF_WORKER_TIMEOUT_SECONDS: "120"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: true
    allowRDS: true
    allowRedis: false
    allowRabbitMQ: true
    allowGateway: false

service:
  type: ClusterIP

podDisruptionBudget:
  enabled: true
  # maxUnavailable: 0 applied automatically by _pdb.tpl when keda.enabled=true

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
