image:
  repository: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pdfmaster/pdf-ocr-service
  tag: "latest"

replicaCount: 1

port: 8080

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

hpa:
  enabled: false  # KEDA replaces HPA

keda:
  enabled: true
  queueName: "pdf-ocr-jobs"
  minReplicas: 0
  maxReplicas: 20
  targetMessageCount: 3

serviceAccount:
  create: true
  annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pdfmaster-pdf-ocr-service

secrets:
  - name: rabbitmq
    remoteRef: pdfmaster/prod/rabbitmq/connection
  - name: postgres
    remoteRef: pdfmaster/prod/postgres/master-password

config:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://RDS_HOST_PLACEHOLDER:5432/pdfocr"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_FLYWAY_ENABLED: "true"
  AWS_S3_BUCKET: "pdfmaster-prod-documents"
  AWS_REGION: "us-east-1"
  # Tess4J / Tesseract settings
  TESSERACT_DATA_PATH: "/usr/share/tessdata"
  TESSERACT_LANGUAGE: "eng"
  PDF_WORKER_TIMEOUT_SECONDS: "300"

networkPolicy:
  enabled: true
  egress:
    allowDNS: true
    allowS3: true
    allowRDS: true
    allowRedis: false
    allowRabbitMQ: true
    allowGateway: false

service:
  type: ClusterIP

podDisruptionBudget:
  enabled: true
