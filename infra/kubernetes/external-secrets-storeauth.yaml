# ClusterSecretStore — points External Secrets Operator at AWS Secrets Manager.
# This is also created by the Terraform external-secrets module, but having it
# here allows bootstrapping with kubectl before Terraform runs.
#
# Replace ACCOUNT_ID and REGION before applying manually.
# When Terraform manages this, the kubernetes_manifest resource wins.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/part-of: pdfmaster
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1  # Replace with your region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
