apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pdf-master-slo-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: pdf-master
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: pdf-master.slo.error-rate
      interval: 30s
      rules:
        # Availability SLO: 99% (error budget = 1%)
        - alert: PDFMasterHighErrorRateCritical
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master"}[5m]))
            ) > 0.01
          for: 5m
          labels:
            severity: critical
            team: platform
            slo: availability
          annotations:
            summary: "HTTP error rate exceeds 1% SLO (critical)"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes across all PDF-Master services, breaching the 99% availability SLO."
            runbook_url: "https://runbooks.pdfmaster.app/slo/error-rate"

        - alert: PDFMasterHighErrorRateWarning
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master", status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master"}[5m]))
            ) > 0.005
          for: 5m
          labels:
            severity: warning
            team: platform
            slo: availability
          annotations:
            summary: "HTTP error rate approaching 1% SLO threshold"
            description: "Error rate is {{ $value | humanizePercentage }} — approaching the 1% SLO limit."

    - name: pdf-master.slo.latency
      interval: 30s
      rules:
        # Latency SLO: p95 < 1s
        - alert: PDFMasterHighLatencyCritical
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{namespace="pdf-master"}[5m])) by (le)
            ) > 1.0
          for: 5m
          labels:
            severity: critical
            team: platform
            slo: latency
          annotations:
            summary: "p95 HTTP latency exceeds 1s SLO (critical)"
            description: "p95 latency is {{ $value | humanizeDuration }} across all PDF-Master services — breaching the 1s latency SLO."
            runbook_url: "https://runbooks.pdfmaster.app/slo/latency"

        - alert: PDFMasterHighLatencyWarning
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket{namespace="pdf-master"}[5m])) by (le)
            ) > 0.75
          for: 5m
          labels:
            severity: warning
            team: platform
            slo: latency
          annotations:
            summary: "p95 HTTP latency approaching 1s SLO threshold"
            description: "p95 latency is {{ $value | humanizeDuration }} — approaching the 1s SLO limit."

    - name: pdf-master.slo.error-budget-burn
      interval: 1m
      rules:
        # Fast burn: consuming error budget at 14.4x rate (1-hour window alert)
        # At 14.4x burn, 100% of monthly error budget is exhausted in ~2 days.
        - alert: PDFMasterErrorBudgetFastBurnCritical
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master", status=~"5.."}[1h]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master"}[1h]))
            ) > (14.4 * 0.01)
          for: 2m
          labels:
            severity: critical
            team: platform
            slo: error-budget
          annotations:
            summary: "Error budget fast burn rate — 14.4x (critical)"
            description: "Error rate over 1h is {{ $value | humanizePercentage }}, burning error budget at >14.4x rate. Monthly budget will be exhausted in ~2 days."
            runbook_url: "https://runbooks.pdfmaster.app/slo/error-budget-burn"

        # Slow burn: consuming error budget at 3x rate (6-hour window alert)
        - alert: PDFMasterErrorBudgetSlowBurnWarning
          expr: |
            (
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master", status=~"5.."}[6h]))
              /
              sum(rate(http_server_requests_seconds_count{namespace="pdf-master"}[6h]))
            ) > (3 * 0.01)
          for: 15m
          labels:
            severity: warning
            team: platform
            slo: error-budget
          annotations:
            summary: "Error budget slow burn rate — 3x"
            description: "Error rate over 6h is {{ $value | humanizePercentage }}, burning error budget at >3x rate."
