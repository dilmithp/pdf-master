# Helm values for kube-prometheus-stack (self-hosted fallback if Grafana Cloud is not available)
# Chart: prometheus-community/kube-prometheus-stack
# Version: >= 58.0.0
#
# Usage: helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace -f values.yaml

fullnameOverride: "prometheus"

## Prometheus configuration
prometheus:
  prometheusSpec:
    replicas: 2
    retention: 30d
    retentionSize: "50GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    additionalScrapeConfigs:
      - job_name: "pdf-master-services"
        scrape_interval: 15s
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["pdf-master"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
    ruleSelector:
      matchLabels:
        app.kubernetes.io/part-of: pdf-master
    ruleNamespaceSelector:
      matchNames: [monitoring, pdf-master]

## Alertmanager configuration
alertmanager:
  alertmanagerSpec:
    replicas: 2
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, cluster, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "pagerduty-critical"
      routes:
        - match:
            severity: critical
          receiver: "pagerduty-critical"
        - match:
            severity: warning
          receiver: "slack-warnings"
    receivers:
      - name: "pagerduty-critical"
        pagerduty_configs:
          - service_key: "${PAGERDUTY_INTEGRATION_KEY}"
            send_resolved: true
      - name: "slack-warnings"
        slack_configs:
          - api_url: "${SLACK_WEBHOOK_URL}"
            channel: "#alerts-warnings"
            send_resolved: true
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Details:* {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`{{ end }}
              {{ end }}

## Grafana configuration
grafana:
  enabled: true
  adminPassword: "${GRAFANA_ADMIN_PASSWORD}"
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  grafana.ini:
    server:
      domain: grafana.pdfmaster.app
      root_url: "https://grafana.pdfmaster.app"
    auth:
      disable_login_form: false
    security:
      allow_embedding: false
      cookie_secure: true

## Node exporter
nodeExporter:
  enabled: true

## kube-state-metrics
kubeStateMetrics:
  enabled: true

## Default rules - disable what we replace with custom rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    windows: false
