server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pdfmaster}
    username: ${DB_USERNAME:pdfmaster}
    password: ${DB_PASSWORD:pdfmaster}
  jpa:
    properties:
      hibernate:
        default_schema: auth
        jdbc.lob.non_contextual_creation: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    schemas: [auth]
    default-schema: auth
    create-schemas: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      authorizationserver:
        issuer: ${AUTH_ISSUER_URI:http://localhost:8081}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
