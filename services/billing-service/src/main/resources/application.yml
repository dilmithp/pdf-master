server:
  port: 8085
spring:
  application:
    name: billing-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pdfmaster}
    username: ${DB_USERNAME:pdfmaster}
    password: ${DB_PASSWORD:pdfmaster}
  jpa:
    properties:
      hibernate:
        default_schema: billing
        jdbc.lob.non_contextual_creation: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    schemas: [billing]
    default-schema: billing
    create-schemas: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        default-requeue-rejected: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/oauth2/jwks}
stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
