server:
  port: 8086
spring:
  application:
    name: notification-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pdfmaster}
    username: ${DB_USERNAME:pdfmaster}
    password: ${DB_PASSWORD:pdfmaster}
  jpa:
    properties:
      hibernate:
        default_schema: notification
        jdbc.lob.non_contextual_creation: true
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    schemas: [notification]
    default-schema: notification
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/oauth2/jwks}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
postmark:
  server-token: ${POSTMARK_SERVER_TOKEN:postmark_token_placeholder}
  from-address: ${POSTMARK_FROM_ADDRESS:no-reply@pdfmaster.test}
  base-url: ${POSTMARK_BASE_URL:https://api.postmarkapp.com}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
