spring:
  application:
    name: pdf-ocr-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/oauth2/jwks}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1s
          multiplier: 2
          max-interval: 10s

server:
  port: ${PORT:8088}
  shutdown: graceful
  forward-headers-strategy: framework

aws:
  s3:
    bucket: ${S3_BUCKET:pdfmaster-uploads}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}

tesseract:
  data-path: ${TESSDATA_PREFIX:/usr/share/tesseract-ocr/4.00/tessdata}
  page-seg-mode: ${TESSERACT_PSM:1}

pdfocr:
  engine: ${OCR_ENGINE:noop}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
